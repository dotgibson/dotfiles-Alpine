# .github/workflows/bootstrap.yml
# Thin caller for the reusable bootstrap test authored in dotfiles-core. The logic
# lives there (one place for the whole fleet); this just names Alpine's container +
# the deps bootstrap needs. See dotfiles-core/.github/workflows/bootstrap-test.yml.
name: bootstrap

on:
  pull_request:
    paths: ['bootstrap.sh', 'core/lib/**', '.github/workflows/bootstrap.yml']
  push:
    branches: [main]
    paths: ['bootstrap.sh', 'core/lib/**']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    uses: Gerrrt/dotfiles-core/.github/workflows/bootstrap-test.yml@main
    with:
      image: alpine:3.20
      prep: apk add --no-cache bash zsh
